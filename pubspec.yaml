name: sporttag
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.6.0
  http: ^0.13.6
  logger: ^2.4.0
  parse_server_sdk_flutter: ^7.0.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3
  syncfusion_flutter_pdfviewer: ^20.4.54
  web: ^1.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"